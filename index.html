<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Parâmetros de Compras</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body {
    background: #ffffff;
    color: #1a1f2e;
    min-height: 100vh;
    padding: 32px 24px;
  }
  .container {
    max-width: 1280px;
    margin: 0 auto;
  }
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 28px;
    gap: 24px;
  }
  .page-header-text h1 {
    font-size: 26px;
    font-weight: 700;
    color: #1a1f2e;
    margin-bottom: 6px;
  }
  .page-header-text .subtitle {
    color: #5a6578;
    font-size: 14px;
  }
  .page-header img {
    height: 56px;
    width: auto;
    flex-shrink: 0;
  }
  .table-card {
    background: #ffffff;
    border: 1px solid #e3e6ed;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 1px 3px rgba(15, 20, 25, 0.04);
  }
  .table-header {
    display: grid;
    grid-template-columns: 1fr 160px 160px 160px 110px;
    gap: 16px;
    padding: 14px 20px;
    background: #898989;
    border-bottom: 1px solid #e3e6ed;
    font-size: 13px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.3px;
  }
  .row {
    display: grid;
    grid-template-columns: 1fr 160px 160px 160px 110px;
    gap: 16px;
    align-items: center;
    padding: 12px 20px;
    border-bottom: 1px solid #eef0f4;
  }
  .row:last-child { border-bottom: none; }
  input[type="text"], input[type="number"], input[type="date"] {
    width: 100%;
    background: #ffffff;
    border: 1px solid #d3d8e2;
    border-radius: 6px;
    padding: 10px 12px;
    color: #1a1f2e;
    font-size: 14px;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  input:focus {
    outline: none;
    border-color: #898989;
    box-shadow: 0 0 0 3px rgba(137, 137, 137, 0.15);
  }
  input::placeholder { color: #9aa3b3; }
  .actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }
  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: 6px;
    border: 1.5px solid;
    background: transparent;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .btn-trash { border-color: #c4424c; color: #c4424c; }
  .btn-trash:hover { background: rgba(196, 66, 76, 0.08); }
  .btn-add { border-color: #2ea76b; color: #2ea76b; }
  .btn-add:hover { background: rgba(46, 167, 107, 0.08); }
  .btn-trash svg, .btn-add svg { width: 18px; height: 18px; }
  .footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 24px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .info {
    color: #5a6578;
    font-size: 13px;
  }
  .btn-primary {
    background: #4a4a4a;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: #5a5a5a; }
  .btn-primary:disabled { background: #d3d8e2; cursor: not-allowed; }
  @media (max-width: 768px) {
    .page-header img { height: 40px; }
    .table-header { display: none; }
    .row {
      grid-template-columns: 1fr;
      gap: 8px;
      padding: 14px;
    }
    .row input { padding: 12px; }
    .actions { justify-content: flex-start; margin-top: 4px; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <div class="page-header-text">
      <h1>Parâmetros de Compras</h1>
      <p class="subtitle">Preencha os produtos abaixo. Campos em branco aparecerão como "-" no PDF.</p>
    </div>
    <img id="logo" src="data:image/jpeg;base64,/9j/4AAQSkZJRgABAQAAAQABAAD/4gHYSUNDX1BST0ZJTEUAAQEAAAHIAAAAAAQwAABtbnRyUkdCIFhZWiAH4AABAAEAAAAAAABhY3NwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAQAA9tYA[...]
  </div>

  <div class="table-card">
    <div class="table-header">
      <div>PRODUTO</div>
      <div>QUANT. ATUAL</div>
      <div>COMPRAR</div>
      <div>DATA DE VALIDADE</div>
      <div></div>
    </div>
    <div id="rows"></div>
  </div>

  <div class="footer">
    <div class="info"><span id="count">0</span> linha(s) preenchida(s)</div>
    <button class="btn-primary" onclick="generatePDF()">Gerar PDF</button>
  </div>
</div>

<script>
  const trashSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="[...]
  const plusSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="1[...]

  const rowsEl = document.getElementById("rows");
  const countEl = document.getElementById("count");

  function makeRow() {
    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <input type="text" placeholder="Nome do produto" class="produto" oninput="updateCount()">
      <input type="text" placeholder="Quant. atual" class="atual" oninput="updateCount()">
      <input type="text" placeholder="Comprar" class="comprar" oninput="updateCount()">
      <input type="date" placeholder="Data de validade" class="validade" oninput="updateCount()">
      <div class="actions">
        <button class="btn-icon btn-trash" onclick="removeRow(this)" title="Remover">${trashSvg}</button>
        <button class="btn-icon btn-add" onclick="addRow()" title="Adicionar">${plusSvg}</button>
      </div>
    `;
    rowsEl.appendChild(row);
  }

  function addRow() { makeRow(); updateCount(); }

  function removeRow(btn) {
    if (rowsEl.children.length <= 1) {
      const row = btn.closest(".row");
      row.querySelectorAll("input").forEach(i => i.value = "");
    } else {
      btn.closest(".row").remove();
    }
    updateCount();
  }

  function updateCount() {
    let n = 0;
    rowsEl.querySelectorAll(".row").forEach(r => {
      const inputs = r.querySelectorAll("input");
      if ([...inputs].some(i => i.value.trim() !== "")) n++;
    });
    countEl.textContent = n;
  }

  function formatDate(dateStr) {
    if (!dateStr) return "-";
    const [year, month, day] = dateStr.split("-");
    return `${day}/${month}/${year}`;
  }

  function collectData() {
    const data = [];
    rowsEl.querySelectorAll(".row").forEach(r => {
      const produto = r.querySelector(".produto").value.trim();
      const atual = r.querySelector(".atual").value.trim();
      const comprar = r.querySelector(".comprar").value.trim();
      const validade = r.querySelector(".validade").value.trim();
      if (!produto && !atual && !comprar && !validade) return;
      data.push([
        produto || "-",
        atual || "-",
        comprar || "-",
        formatDate(validade)
      ]);
    });
    return data;
  }

  function generatePDF() {
    const data = collectData();
    if (data.length === 0) {
      alert("Preencha pelo menos uma linha antes de gerar o PDF.");
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
    const pageWidth = doc.internal.pageSize.getWidth();

    // Logo no canto superior direito do PDF
    try {
      const logoSrc = document.getElementById("logo").src;
      // proporção do logo: 539x163 -> ~3.31:1
      const logoW = 42; // mm
      const logoH = logoW * (163 / 539);
      const marginRight = 14;
      const marginTop = 8;
      doc.addImage(
        logoSrc,
        "JPEG",
        pageWidth - logoW - marginRight,
        marginTop,
        logoW,
        logoH
      );
    } catch (e) {
      console.warn("Falha ao adicionar logo no PDF:", e);
    }

    // Título no topo, alinhado verticalmente com a logo
    doc.setFont("helvetica", "bold");
    doc.setFontSize(14);
    doc.text("PARAMETROS DE COMPRAS", 14, 18);

    doc.autoTable({
      startY: 26,
      head: [["PRODUTO", "QUANT. ATUAL", "COMPRAR", "DATA DE VALIDADE"]],
      body: data,
      theme: "grid",
      headStyles: {
        fillColor: [137, 137, 137],
        textColor: [255, 255, 255],
        fontStyle: "bold",
        halign: "center",
        fontSize: 10,
        lineColor: [0, 0, 0],
        lineWidth: 0.2,
      },
      bodyStyles: {
        textColor: [0, 0, 0],
        fontSize: 10,
        lineColor: [0, 0, 0],
        lineWidth: 0.2,
        minCellHeight: 9,
      },
      columnStyles: {
        0: { cellWidth: 70 },
        1: { cellWidth: 35, halign: "center" },
        2: { cellWidth: 35, halign: "center" },
        3: { cellWidth: 45, halign: "center" },
      },
      margin: { left: 14, right: 14 },
    });

    const now = new Date();
    const stamp = `${String(now.getDate()).padStart(2,"0")}-${String(now.getMonth()+1).padStart(2,"0")}-${now.getFullYear()}`;
    doc.save(`parametros-de-compras_${stamp}.pdf`);
  }

  makeRow();
</script>
</body>
</html>
